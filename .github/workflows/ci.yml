name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check (report scripts)
        run: |
          node --check scripts/generate_8k_validation_report.mjs
          node --check scripts/generate_8k_batch_report.mjs

      - name: Python syntax check (upload helper)
        run: python3 -m py_compile scripts/upload_ctx8192_model_to_hf.py

      - name: Required file smoke check
        run: |
          test -f README.md
          test -f docs/CUSTOM_CONTEXT_GUIDE.md
          test -f docs/VALIDATION_PROTOCOL_8K.md
          test -f docs/HUGGINGFACE_ONE_CLICK_8K.md
