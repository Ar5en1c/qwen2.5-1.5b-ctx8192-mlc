name: Feature request
description: Suggest an improvement to UX, benchmarking, model support, or docs.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-line feature description
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - UX / UI
        - Model support
        - Benchmarking metrics
        - Docs / onboarding
        - Build / automation
        - Community features
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard today for users?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, controls, and outputs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workaround or different approach
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How should we measure this was successful?
      placeholder: e.g., fewer init failures, faster first successful run, clearer docs path
